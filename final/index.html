<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 231 - Pam Christison - My Recipe Workbench - Final Project</title>
    <meta name="description" content="Pam Christison | WDD 231 | Final Project ~ My Recipe Workbench - home page">
    <meta name="author" content="Pam Christison">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <meta property="og:title" content="My Recipe Workbench - Final Project - WDD 231">
    <meta property="og:description" content="My Recipe Workbench - a recipe and meal planning site">
    <meta property="og:image" content="https://kimchristian50.github.io/wdd231/final/images/logo.webp">
    <meta property="og:url" content="https://kimchristian50.github.io/wdd231/final">
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css">
    <script src="scripts/dates.js" defer></script>
    <script src="scripts/navigation.js" defer></script>
</head>

<body>
    <header>
        <img src="images/logo.webp" alt="Site Logo" width="160" height="80" fetchpriority="high">
        <span>My Recipe Workbench</span>
        <nav id="nav-bar" class="navigation">
            <ul>
                <li class="current"><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="plan.html">Plan</a></li>
            </ul>
        </nav>
        <button id="ham-btn" class="hamburger" aria-label="Main Menu"></button>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero.webp" alt="A family cooking together who obviously needs recipe help" width="1000"
                height="500">
        </div>
        <h1>My Recipe Workbench</h1>
        <p>Take your cooking from chaos to organization!</p>
        <div class="main">
            <a href="search.html" class="card-link">
                <div class="search">
                    <h2>Recipe Search</h2>
                    <img src="images/search.webp" alt="A bowl of chicken tortilla soup" width="300" height="200"
                        loading="lazy">
                </div>
            </a>
            <a href="plan.html" class="card-link">
                <div class="planner">
                    <h2>Meal Planner</h2>
                    <img src="images/plan.webp" alt="A plate of chicken caprese" width="300" height="200"
                        loading="lazy">
                </div>
            </a>
            <div id="form-levels-container">
                <form method="GET" action="thankyou.html" class="form">
                    <h2>Get Notifications When Recipes Are Added</h2>
                    <label for="name">Name <input type="text" name="name" required autocomplete="name" title="Your Name"
                            id="name"></label>

                    <label for="email">Email <input type="email" name="email" required placeholder="anyone@gmail.com"
                            title="Your Email" autocomplete="email" id="email"></label>
                    <input type="submit" value="Notify me">
                </form>
            </div>
        </div>

    </main>
    <footer>
        <div class="social">
            <a href="https://www.facebook.com/pam.christison/" target="_blank"><img src="images/facebook.svg"
                    alt="Facebook icon" width="22" height="22"></a>
            <a href="https://www.linkedin.com/in/pamchristison/" target="_blank"><img src="images/linkedin.svg"
                    alt="LinkedIn icon" width="22" height="22"></a>
            <a href="https://youtube.com" target="_blank"><img src="images/youtube.svg" alt="Youtube icon" width="22"
                    height="22"></a>
        </div>
        <div class="whole-footer">
            <div class="footerdates">
                <p>&copy; <span id="currentyear"></span> - Pam Christison ~ New Mexico, USA</p>
                <p><span id="lastModified">Last Modified</span></p>
            </div>
            <div class="footer-extras">
                <p><a href="attributions.html" target="_blank">Attributions</a></p>
                <p><a href="attributions.html" target="_blank">Video</a></p>
            </div>
        </div>
    </footer>
</body>

</html>
